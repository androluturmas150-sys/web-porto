<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Admin Login
</title>


<link rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">


</head>


<body>



<div class="login-page">



<div class="login-card">



<h1>
ADMIN
</h1>



<p>
Portfolio Dashboard
</p>





<form action="/login" method="POST">



<input

type="text"

name="username"

placeholder="Username"

required

>




<input

type="password"

name="password"

placeholder="Password"

required

>





<button type="submit">

Login

</button>




</form>




</div>


</div>




</body>


</html>
